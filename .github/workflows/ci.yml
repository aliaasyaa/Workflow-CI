name: CI — MLflow Training & Docker Build

# ─────────────────────────────────────────────────────────────
# Trigger: jalankan workflow saat ada push ke branch main
# yang mengubah file di dalam folder MLProject/,
# atau dipicu secara manual via tab Actions.
# ─────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "MLProject/**"
  workflow_dispatch:

# Izin menulis ke repo (untuk commit mlruns & docker_image_link.txt)
permissions:
  contents: write

jobs:
  train-and-dockerize:
    name: Train Model + Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ─────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── 2. Setup Python ──────────────────────────────────────
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ── 3. Install dependencies ───────────────────────────────
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install mlflow scikit-learn pandas numpy matplotlib seaborn

      # ── 4. Jalankan MLflow Project ───────────────────────────
      - name: Run MLflow Project
        run: |
          cd MLProject
          mlflow run . \
            --env-manager=local \
            --experiment-name "Stroke_Classification_Basic"

      # ── 5. Ambil Run ID terbaru ───────────────────────────────
      - name: Get latest Run ID
        run: |
          RUN_ID=$(cd MLProject && python3 -c "
          import mlflow
          client = mlflow.tracking.MlflowClient()
          exp = client.get_experiment_by_name('Stroke_Classification_Basic')
          if exp is None:
              raise ValueError('Experiment tidak ditemukan')
          runs = client.search_runs(
              [exp.experiment_id],
              order_by=['start_time DESC']
          )
          print(runs[0].info.run_id)
          ")
          echo "RUN_ID=$RUN_ID" >> $GITHUB_ENV
          echo "Latest Run ID: $RUN_ID"
          echo "$RUN_ID" > MLProject/run_id.txt

      # ── 6. Simpan artefak mlruns ke GitHub ───────────────────
      - name: Commit mlruns artifacts to GitHub
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add MLProject/mlruns/
          git add MLProject/run_id.txt
          git diff --staged --quiet \
            || git commit -m "ci: update model artifacts [skip ci]"
          git push

      # ── 7. Setup Docker Buildx ────────────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── 8. Login ke Docker Hub ───────────────────────────────
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── 9. Build Docker image dengan mlflow build-docker ─────
      - name: Build Docker image using mlflow build-docker
        run: |
          cd MLProject
          IMAGE_NAME="${{ secrets.DOCKERHUB_USERNAME }}/stroke-classification"
          echo "Building image: $IMAGE_NAME"

          mlflow models build-docker \
            --model-uri "runs:/${{ env.RUN_ID }}/model" \
            --name "$IMAGE_NAME" \
            --env-manager local

          echo "IMAGE_NAME=$IMAGE_NAME" >> $GITHUB_ENV
          echo "Build selesai: $IMAGE_NAME"

      # ── 10. Push Docker image ke Docker Hub ───────────────────
      - name: Push Docker image to Docker Hub
        run: |
          docker push "${{ env.IMAGE_NAME }}:latest"
          echo "Docker image berhasil dipush:"
          echo "  https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/stroke-classification"

      # ── 11. Update docker_image_link.txt & commit ────────────
      - name: Update docker_image_link.txt
        run: |
          echo "https://hub.docker.com/r/${{ secrets.DOCKERHUB_USERNAME }}/stroke-classification" \
            > MLProject/docker_image_link.txt

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add MLProject/docker_image_link.txt
          git diff --staged --quiet \
            || git commit -m "ci: update Docker Hub link [skip ci]"
          git push
